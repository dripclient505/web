Di hadapan orang tuanya, Arga akhirnya mengakui semuanya. Ia tidak pernah berniat menyakiti siapa pun, tapi kenyataannya, ia sudah melakukannya. Air mata ibunya jatuh. Ayahnya hanya terdiam, kecewa.

Arga pun harus menghadapi konsekuensi dari perbuatannya. Bukan hanya secara hukum, tapi juga secara sosial. Teman-temannya mulai menjauh. Kepercayaan yang dulu ia miliki hilang begitu saja. Nama baiknya rusak.

Dari situlah Arga benar-benar belajar.

Ia menyadari bahwa data bukan sekadar angka atau file. Di balik setiap data, ada kehidupan seseorang. Ada perasaan, privasi, dan kepercayaan. Mengambil data orang lain tanpa izin sama saja dengan melanggar batas yang sangat penting.

Setelah melalui proses panjang, Arga berusaha memperbaiki dirinya. Ia mulai menggunakan kemampuannya untuk hal yang baik. Ia belajar tentang keamanan digital secara benar, dan bahkan membantu orang lain menjaga akun mereka agar tidak mengalami hal yang sama.

Namun, satu hal yang tidak bisa ia kembalikan adalah waktu dan kepercayaan yang telah hilang.

Cerita Arga menjadi pengingat bahwa tindakan kecil yang dianggap sepele bisa membawa dampak besar. Rasa penasaran tanpa batas, ditambah kemampuan tanpa tanggung jawab, bisa berubah menjadi sesuatu yang berbahaya.

Di dunia yang serba digital ini, menjaga data bukan hanya soal teknologi, tapi juga soal etika. Setiap orang punya hak atas privasinya. Dan melanggar itu, dengan alasan apa pun, tetaplah salah.

Karena sekali kepercayaan hancur, tidak semudah itu untuk memperbaikinya kembali.-->
